AWSTemplateFormatVersion: "2010-09-09"
Description: >
  OpenClaw one-click deployment. Provisions a single EC2 instance (Ubuntu 22.04),
  installs Node.js 20 + OpenClaw via UserData, configures the chosen LLM provider
  and Telegram channel, exposes the agent gateway on port 18789. Total time:
  ~50–90 seconds for the instance to launch + ~30s for the bootstrap script.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Agent configuration" }
        Parameters: [ ModelProvider, ModelApiKey, TelegramBotToken ]
      - Label: { default: "Instance & access" }
        Parameters: [ InstanceType, KeyName, AllowedSshCidr ]
      - Label: { default: "Networking (advanced — leave defaults)" }
        Parameters: [ VpcId, SubnetId ]
    ParameterLabels:
      ModelProvider:    { default: "Model provider" }
      ModelApiKey:      { default: "Model API key" }
      TelegramBotToken: { default: "Telegram bot token (optional)" }
      InstanceType:     { default: "EC2 instance type" }
      KeyName:          { default: "EC2 key pair (for SSH)" }
      AllowedSshCidr:   { default: "Allowed SSH source CIDR" }
      VpcId:            { default: "VPC (default: auto-pick default VPC)" }
      SubnetId:         { default: "Subnet (default: auto-pick from VPC)" }

Parameters:
  ModelProvider:
    Type: String
    Default: moonshot
    AllowedValues: [ moonshot, anthropic, openai, google, deepseek, xai ]
    Description: Which LLM should the agent route to. moonshot=Kimi K2.6.

  ModelApiKey:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: API key for the chosen provider. Stored on the instance as a 0600 env file at /etc/openclaw/env.

  TelegramBotToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional. Telegram BotFather token. Leave blank to skip Telegram and add a channel later.

  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [ t3.small, t3.medium, t3.large, t4g.small, t4g.medium ]
    Description: t3.small (2 vCPU / 2 GB) is enough for light usage; bump to t3.medium (4 GB) for skill-heavy workloads.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair name. Required for SSH. Create one in the EC2 console first if you don't have one.

  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/([0-9]|[1-2][0-9]|3[0-2])$"
    Description: CIDR block allowed to SSH in. Default 0.0.0.0/0 is open to the world — narrow to your IP/32 for production.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch into. Pick your default VPC if unsure.

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet inside the chosen VPC. Pick any default-VPC subnet if unsure.

# Latest Ubuntu 22.04 LTS AMI per region (Canonical official, x86_64).
# Fetched via SSM Parameter Store so it always picks the current image —
# no stale AMI IDs to maintain in this template.
Mappings: {}

Resources:

  # ── Security group: open SSH (22) and the OpenClaw gateway (18789) only.
  OpenClawSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: OpenClaw — SSH and agent gateway
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort:   22
          CidrIp:   !Ref AllowedSshCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 18789
          ToPort:   18789
          CidrIp:   0.0.0.0/0
          Description: OpenClaw agent gateway

  # ── The EC2 instance. UserData runs once on first boot and installs OpenClaw.
  OpenClawInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName:      !Ref KeyName
      ImageId:      "{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}"
      SubnetId:     !Ref SubnetId
      SecurityGroupIds:
        - !Ref OpenClawSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-openclaw"
        - Key: ManagedBy
          Value: CloudFormation
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail
          LOG=/var/log/openclaw-bootstrap.log
          exec > >(tee -a $LOG) 2>&1
          echo "[$(date)] OpenClaw bootstrap starting"

          # ── Write the env file before installing — OpenClaw onboard uses it
          mkdir -p /etc/openclaw
          cat > /etc/openclaw/env <<EOF
          OPENCLAW_PROVIDER=${ModelProvider}
          OPENCLAW_MODEL_API_KEY=${ModelApiKey}
          TELEGRAM_BOT_TOKEN=${TelegramBotToken}
          OPENCLAW_GATEWAY_PORT=18789
          EOF
          chmod 600 /etc/openclaw/env

          # ── Install Node.js 20 + dependencies
          apt-get update -y
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs git build-essential

          # ── Install OpenClaw globally
          npm install -g openclaw@latest

          # ── Run OpenClaw onboard non-interactively as the ubuntu user
          mkdir -p /opt/openclaw && chown ubuntu:ubuntu /opt/openclaw
          set -a; source /etc/openclaw/env; set +a
          sudo -u ubuntu --preserve-env env HOME=/home/ubuntu bash -c \
            "cd /opt/openclaw && openclaw onboard --non-interactive --provider $OPENCLAW_PROVIDER --gateway-port 18789 || true"

          # ── systemd unit so OpenClaw survives reboots
          cat > /etc/systemd/system/openclaw.service <<EOF
          [Unit]
          Description=OpenClaw agent gateway
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=ubuntu
          EnvironmentFile=/etc/openclaw/env
          WorkingDirectory=/opt/openclaw
          ExecStart=/usr/bin/openclaw start --gateway-port 18789
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
          EOF

          systemctl daemon-reload
          systemctl enable --now openclaw.service

          echo "[$(date)] OpenClaw bootstrap complete"

  # ── Elastic IP so the gateway URL is stable across stop/start.
  OpenClawEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref OpenClawInstance

Outputs:
  GatewayUrl:
    Description: OpenClaw agent gateway URL — open this in your browser once UserData finishes (~90s after stack CREATE_COMPLETE).
    Value: !Sub "http://${OpenClawEip}:18789"

  PublicIp:
    Description: Public IP (Elastic, won't change on reboot).
    Value: !Ref OpenClawEip

  SshCommand:
    Description: SSH command (run from a shell where the chosen key pair is loaded).
    Value: !Sub "ssh -i ~/.ssh/${KeyName}.pem ubuntu@${OpenClawEip}"

  BootstrapLog:
    Description: Where to tail bootstrap progress over SSH.
    Value: "sudo tail -f /var/log/openclaw-bootstrap.log"
